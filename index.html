<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{
            margin: 0;
            background: #060609;
            color: #fff;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.2px;
        }

        .header-container{
            text-align: cetner;
            margin-bottom: 24px;
        }

        h1{
            margin: 0 0 6px 0;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: none;
        }

        p{
            margin: 0;
            font-size: 0.9rem;
            color: #646473;
            font-weight: 600;
            letter-spacing: 0px;
        }

        canvas{
            border: 1px solid rgba(255,255,255, 0.08);
            background: rgba(15, 15, 22, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Chrono Slash</h1>
        <p>Press the "A" KEY to fire when an enemy enters the circle</p>
    </div>

    <canvas id="gameCanvas" width="1000" height="550"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const canvasContext = canvas.getContext('2d');

        let score = 0;
        let gameOver = false;
        let enemies = [];
        let lasers = [];
        let particles = [];
        let floatingTexts = [];
        let spawnCircleIntercal = 120;
        let frameCount = 0;
        let currentLEvel = 1;

        let shakeIntensity = 0;
        let shakeDecay = 0.9;

        let isKeyALocked = false;

        const player ={
            x: canvas.width/2,
            y: canvas.height/2,
            radius: 35,
            strikeZone
        };

        window.addEventListener('keydown', function(event){
            event.preventDefault();

            if (gameOver){
                resetGame();
                return;
            }
            
            if(event.key === 'a' || event.key === 'A'){
                if(isKeyALocked) return;

                handleSlash();
                isKeyALocked = true;
            }
        });

        window.addEventListener('keyup', function(event){
            if(event.key === 'a' || event.key === 'A'){
                isKeyALocked = false;
            }
        });

        function createExplosion(x, y, color, count){
            for(let i = 0; i < count; i++){
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 5;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    alpha: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    color: color,
                    radius: 1.5 + Math.random() * 2.5
                })
            }
        }

        function createFloatingText(x, y, text, color){
            floatingTexts.push({
                x: x,
                y: y - 15,
                text: text,
                color: color,
                alpha: 1,
                velocityUp: 0.8
            })
        }
    </script>
</body>
</html>
