<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Slash - One Key Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #060609; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.2px; 
        }
        
        .header-container {
            text-align: center;
            margin-bottom: 24px; 
        }

        h1 {
            margin: 0 0 6px 0; 
            font-size: 2.8rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: #fff; 
            text-shadow: none; 
        }

        p {
            margin: 0;
            font-size: 0.9rem; 
            color: #646473; 
            font-weight: 600; 
            letter-spacing: 0px; 
        }

        canvas {
            border: 1px solid rgba(255, 255, 255, 0.08); 
            background: rgba(15, 15, 22, 0.6); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Chrono Slash</h1>
        <p>Press the "O" KEY to slash when an enemy enters the circle</p> 
    </div>
    
    <canvas id="gameCanvas" width="1000" height="550"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const canvasContext = canvas.getContext('2d');

        let score = 0; 
        let enemies = []; 
        let lasers = []; 
        let particles = []; 
        let floatingTexts = []; 
        let spawnCircleInterval = 120; 
        let frameCount = 0; 
        let currentLevel = 1; 

        let shakeIntensity = 0;
        let shakeDecay = 0.9; 

        let isKeyOLocked = false; 

        let gameState = "START"; 
        let gameOverTime = 0;             
        const restartCooldown = 2500;     

        const player = {
            x: canvas.width / 2, 
            y: canvas.height / 2, 
            radius: 35, 
            strikeZone: 240 
        };

        window.addEventListener('keydown', function(event) {
            event.preventDefault(); 
            
            if (gameState === "START") {
                gameState = "PLAYING";
                return;
            }

            // CHANGED FOR STEP 3: Check cooldown before resetting game state
            if (gameState === "GAMEOVER") {
                const elapsed = Date.now() - gameOverTime;
                if (elapsed >= restartCooldown) {
                    resetGame();
                }
                return; 
            }
            
            if (event.key === 'o' || event.key === 'O') {
                if (isKeyOLocked) return;
                
                if (gameState === "PLAYING") {
                    handleSlash();
                } 
                isKeyOLocked = true; 
            }
        });

        window.addEventListener('keyup', function(event) {
            if (event.key === 'o' || event.key === 'O') {
                isKeyOLocked = false; 
            }
        });

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2; 
                const speed = 1 + Math.random() * 5; 
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed, 
                    vy: Math.sin(angle) * speed, 
                    alpha: 1, 
                    decay: 0.02 + Math.random() * 0.03, 
                    color: color,
                    radius: 1.5 + Math.random() * 2.5 
                });
            }
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({
                x: x,
                y: y - 15,
                text: text,
                color: color,
                alpha: 1,
                velocityUp: 0.8 
            });
        }

        function handleSlash() {
            if (enemies.length === 0) return; 

            let targetsFiredAt = 0;

            for (let i = 0; i < enemies.length; i++) {
                let target = enemies[i];
                let dx = target.x - player.x; 
                let dy = target.y - player.y; 
                let dist = Math.sqrt(dx * dx + dy * dy); 
                
                if (dist <= player.strikeZone) { 
                    let targetAngle = Math.atan2(target.y - player.y, target.x - player.x); 
                    
                    let judgment = "LATE";
                    let pointAward = 0;
                    let particleColor = '#7a223a'; 

                    if (dist >= 210) { 
                        judgment = "PERFECT";
                        pointAward = 2; 
                        particleColor = '#ffd700'; 
                    } else if (dist >= 120) { 
                        judgment = "GOOD";
                        pointAward = 1; 
                        particleColor = '#00f2fe'; 
                    }

                    lasers.push({
                        x: player.x, 
                        y: player.y,
                        angle: targetAngle, 
                        speed: 22, 
                        length: 50, 
                        targetEnemyRef: target,
                        scorePayload: pointAward,
                        judgmentText: judgment,
                        effectColor: particleColor
                    });

                    targetsFiredAt++;
                }
            }

            if (targetsFiredAt > 0) {
                createExplosion(player.x, player.y, '#ffffff', 12 * targetsFiredAt); 
            }
        }

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const spawnDistance = Math.max(canvas.width, canvas.height) * 0.7;
            const x = player.x + Math.cos(angle) * spawnDistance;
            const y = player.y + Math.sin(angle) * spawnDistance;
            
            const speed = (1.5 + Math.random() * 1.5) * (1 + score * 0.04) * (currentLevel === 2 ? 1.25 : 1); 

            enemies.push({
                x: x, 
                y: y, 
                angle: angle, 
                speed: speed, 
                radius: 12,
                waveSeed: Math.random() * 1000 
            });
        }

        function resetGame() {
            score = 0; 
            enemies = []; 
            lasers = []; 
            particles = []; 
            floatingTexts = []; 
            frameCount = 0; 
            currentLevel = 1; 
            shakeIntensity = 0; 
            isKeyOLocked = false; 
            gameState = "PLAYING"; 
        }

        function triggerShake(intensity) {
            shakeIntensity = intensity;
        }

        function update() {
            if (gameState === "PLAYING") { 
                frameCount++; 

                if (score >= 50) {
                    currentLevel = 2;
                }

                let baseRate = spawnCircleInterval - score * 2;
                if (currentLevel === 2) baseRate -= 20; 
                let currentInterval = Math.max(20, Math.floor(baseRate)); 

                if (frameCount % currentInterval === 0) {
                    spawnEnemy(); 
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= p.decay; 

                    if (p.alpha <= 0) {
                        particles.splice(i, 1); 
                    }
                }

                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    let ft = floatingTexts[i];
                    ft.y -= ft.velocityUp;
                    ft.alpha -= 0.025; 

                    if (ft.alpha <= 0) {
                        floatingTexts.splice(i, 1);
                    }
                }

                for (let i = lasers.length - 1; i >= 0; i--) {
                    let laser = lasers[i];
                    
                    laser.x += Math.cos(laser.angle) * laser.speed;
                    laser.y += Math.sin(laser.angle) * laser.speed;

                    let dx = laser.x - laser.targetEnemyRef.x;
                    let dy = laser.y - laser.targetEnemyRef.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= laser.targetEnemyRef.radius + 10) {
                        let enemyIndex = enemies.indexOf(laser.targetEnemyRef);
                        if (enemyIndex !== -1) {
                            createExplosion(laser.targetEnemyRef.x, laser.targetEnemyRef.y, laser.effectColor, Math.max(10, laser.scorePayload * 15));
                            createFloatingText(laser.targetEnemyRef.x, laser.targetEnemyRef.y, `${laser.judgmentText} +${laser.scorePayload}`, laser.effectColor);
                            
                            enemies.splice(enemyIndex, 1); 
                            score += laser.scorePayload; 
                            
                            triggerShake(laser.scorePayload === 2 ? 8 : (laser.scorePayload === 1 ? 4 : 1));
                        }
                        lasers.splice(i, 1); 
                        continue;
                    }

                    if (laser.x < -100 || laser.x > canvas.width + 100 || laser.y < -100 || laser.y > canvas.height + 100) {
                        lasers.splice(i, 1);
                    }
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i];
                    
                    let baseMoveX = Math.cos(enemy.angle) * enemy.speed;
                    let baseMoveY = Math.sin(enemy.angle) * enemy.speed;

                    if (currentLevel === 2) {
                        let waveFrequency = frameCount * 0.08 + enemy.waveSeed;
                        let waveMagnitude = 1.8; 
                        
                        let perpendicularAngle = enemy.angle + Math.PI / 2;
                        let waveOffset = Math.sin(waveFrequency) * waveMagnitude;

                        enemy.x -= baseMoveX + Math.cos(perpendicularAngle) * waveOffset;
                        enemy.y -= baseMoveY + Math.sin(perpendicularAngle) * waveOffset;
                    } else {
                        enemy.x -= baseMoveX;
                        enemy.y -= baseMoveY;
                    }

                    let dx = enemy.x - player.x;
                    let dy = enemy.y - player.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= player.radius) {
                        gameState = "GAMEOVER";
                        gameOverTime = Date.now();
                        triggerShake(22);
                    }
                }
            }

            if (shakeIntensity > 0.1) {
                shakeIntensity *= shakeDecay;
            } else {
                shakeIntensity = 0;
            }

            render(); 
            requestAnimationFrame(update); 
        }

        function render() {
            canvasContext.save(); 

            if (shakeIntensity > 0) {
                const dx = (Math.random() - 0.5) * shakeIntensity;
                const dy = (Math.random() - 0.5) * shakeIntensity;
                canvasContext.translate(dx, dy);
            }

            canvasContext.clearRect(0, 0, canvas.width, canvas.height); 

            const overdriveRatio = Math.min(1, score / 50);
            
            canvasContext.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            canvasContext.lineWidth = 1.5;
            canvasContext.beginPath();
            canvasContext.arc(player.x, player.y, 210, 0, Math.PI * 2);
            canvasContext.stroke();

            canvasContext.beginPath();
            canvasContext.arc(player.x, player.y, 120, 0, Math.PI * 2);
            canvasContext.stroke();

            canvasContext.strokeStyle = `rgba(${255 * overdriveRatio + 255 * (1 - overdriveRatio)}, ${51 * (1 - overdriveRatio)}, ${102 * (1 - overdriveRatio) + 51 * overdriveRatio}, 0.45)`; 
            canvasContext.lineWidth = 2; 
            canvasContext.beginPath(); 
            canvasContext.arc(player.x, player.y, player.strikeZone, 0, Math.PI * 2); 
            canvasContext.stroke(); 

            let pulseScale = 0;
            if (currentLevel === 2) {
                pulseScale = Math.sin(frameCount * 0.2) * 5; 
            } else {
                pulseScale = Math.sin(frameCount * 0.05) * (3 * overdriveRatio); 
            }
            
            canvasContext.fillStyle = '#00f2fe'; 
            canvasContext.shadowBlur = 25 + pulseScale; 
            canvasContext.shadowColor = '#00f2fe'; 
            canvasContext.beginPath(); 
            canvasContext.arc(player.x, player.y, player.radius + (pulseScale * 0.4), 0, Math.PI * 2); 
            canvasContext.fill(); 
            canvasContext.shadowBlur = 0; 

            canvasContext.lineWidth = 5; 
            canvasContext.shadowBlur = 20; 
            for (let laser of lasers) {
                canvasContext.strokeStyle = '#ffffff'; 
                canvasContext.shadowColor = '#ffffff'; 
                canvasContext.beginPath();
                canvasContext.moveTo(laser.x, laser.y);
                canvasContext.lineTo(laser.x - Math.cos(laser.angle) * laser.length, laser.y - Math.sin(laser.angle) * laser.length);
                canvasContext.stroke();
            }
            canvasContext.shadowBlur = 0; 

            canvasContext.fillStyle = '#ff3366'; 
            for (let enemy of enemies) {
                canvasContext.beginPath(); 
                canvasContext.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2); 
                canvasContext.fill(); 
            }

            for (let p of particles) {
                canvasContext.save(); 
                canvasContext.globalAlpha = p.alpha; 
                canvasContext.fillStyle = p.color;
                canvasContext.beginPath();
                canvasContext.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                canvasContext.fill();
                canvasContext.restore(); 
            }

            canvasContext.font = '800 13px "Plus Jakarta Sans", sans-serif';
            canvasContext.textAlign = 'center';
            for (let ft of floatingTexts) {
                canvasContext.save();
                canvasContext.globalAlpha = ft.alpha;
                canvasContext.fillStyle = ft.color;
                canvasContext.fillText(ft.text, ft.x, ft.y);
                canvasContext.restore();
            }
            canvasContext.textAlign = 'left'; 

            canvasContext.fillStyle = '#ffffff'; 
            canvasContext.font = '600 15px "Plus Jakarta Sans", sans-serif'; 
            canvasContext.fillText(`SCORE • ${score.toString().padStart(3, '0')}`, 40, 45); 

            canvasContext.fillStyle = currentLevel === 2 ? '#ff3366' : '#646473'; 
            const levelText = currentLevel === 1 ? 'LEVEL 01 // STANDARD' : 'LEVEL 02 // OVERDRIVE'; 
            canvasContext.fillText(levelText, canvas.width - 240, 45); 

            // CHANGED FOR STEP 3: Beautiful dedicated GameOver screen with visual timer calculation
            if (gameState === "GAMEOVER") {
                canvasContext.fillStyle = 'rgba(6, 6, 9, 0.95)'; 
                canvasContext.fillRect(0, 0, canvas.width, canvas.height); 
                
                canvasContext.textAlign = 'center'; 
                
                canvasContext.fillStyle = '#ff3366'; 
                canvasContext.font = '800 32px "Plus Jakarta Sans", sans-serif'; 
                canvasContext.fillText('SYSTEM OVERLOAD // CRITICAL', canvas.width / 2, canvas.height / 2 - 80); 
                
                canvasContext.fillStyle = '#ffffff'; 
                canvasContext.font = '600 16px "Plus Jakarta Sans", sans-serif'; 
                canvasContext.fillText(`FINAL SECTOR RECORD: ${score.toString().padStart(3, '0')} NODES`, canvas.width / 2, canvas.height / 2 - 30); 

                // Calculate ongoing lock time remaining
                const timeElapsed = Date.now() - gameOverTime;
                const timeRemaining = Math.max(0, restartCooldown - timeElapsed);

                if (timeRemaining > 0) {
                    // Lock active: Show loading bar and seconds countdown
                    const secondsLeft = (timeRemaining / 1000).toFixed(1);
                    
                    canvasContext.fillStyle = '#646473';
                    canvasContext.font = '600 14px "Plus Jakarta Sans", sans-serif'; 
                    canvasContext.fillText(`RECALIBRATING CORE MATRIX... ${secondsLeft}s`, canvas.width / 2, canvas.height / 2 + 30); 

                    // Minimal countdown tracking line
                    const barWidth = 200;
                    const progress = timeRemaining / restartCooldown;
                    canvasContext.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    canvasContext.fillRect(canvas.width / 2 - barWidth / 2, canvas.height / 2 + 50, barWidth, 4);
                    
                    canvasContext.fillStyle = '#ff3366';
                    canvasContext.fillRect(canvas.width / 2 - barWidth / 2, canvas.height / 2 + 50, barWidth * progress, 4);
                } else {
                    // Lock released: Flashing action text ready to reboot
                    canvasContext.fillStyle = '#00f2fe'; 
                    canvasContext.font = '800 15px "Plus Jakarta Sans", sans-serif'; 
                    canvasContext.fillText('PRESS "O" OR ANY KEY TO REBOOT ARCHITECTURE', canvas.width / 2, canvas.height / 2 + 35); 
                }
                
                canvasContext.textAlign = 'left'; 
            }

            if (gameState === "START") {
                canvasContext.fillStyle = 'rgba(6, 6, 9, 0.95)'; 
                canvasContext.fillRect(0, 0, canvas.width, canvas.height); 

                canvasContext.textAlign = 'center';
                
                canvasContext.fillStyle = '#00f2fe';
                canvasContext.font = '800 32px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('CHRONO SLASH // ARCHITECTURE', canvas.width / 2, canvas.height / 2 - 110);

                canvasContext.fillStyle = '#ffffff';
                canvasContext.font = '600 15px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('DEFEND THE CHRONO-CORE FROM THE INCOMING VECTOR NODES', canvas.width / 2, canvas.height / 2 - 60);

                canvasContext.fillStyle = '#646473';
                canvasContext.fillRect(canvas.width / 2 - 250, canvas.height / 2 - 30, 500, 110);

                canvasContext.fillStyle = '#ffd700'; 
                canvasContext.font = '800 14px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('PERFECT SECTOR (+2 PTS)', canvas.width / 2 - 120, canvas.height / 2 + 0);
                canvasContext.fillStyle = '#ffffff';
                canvasContext.font = '400 13px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('• Outer Ring edge alignment', canvas.width / 2 + 80, canvas.height / 2 + 0);

                canvasContext.fillStyle = '#00f2fe'; 
                canvasContext.font = '800 14px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('GOOD SECTOR (+1 PT)', canvas.width / 2 - 120, canvas.height / 2 + 25);
                canvasContext.fillStyle = '#ffffff';
                canvasContext.font = '400 13px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('• Inside active weapon threshold', canvas.width / 2 + 80, canvas.height / 2 + 25);

                canvasContext.fillStyle = '#ff3366'; 
                canvasContext.font = '800 14px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('LATE SECTOR (0 PTS)', canvas.width / 2 - 120, canvas.height / 2 + 50);
                canvasContext.fillStyle = '#ffffff';
                canvasContext.font = '400 13px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('• Core adjacency warning zone', canvas.width / 2 + 80, canvas.height / 2 + 50);

                canvasContext.fillStyle = '#00f2fe';
                canvasContext.font = '800 15px "Plus Jakarta Sans", sans-serif';
                canvasContext.fillText('PRESS "O" OR ANY OTHER KEY TO INITIALIZE SYSTEMS', canvas.width / 2, canvas.height / 2 + 125);

                canvasContext.textAlign = 'left';
            }

            canvasContext.restore(); 
        }

        update(); 
    </script>
</body>
</html>
